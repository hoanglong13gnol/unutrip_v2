name: RAG service

on:
  workflow_dispatch:
  push:
    paths:
      - "backend/rag/**"
      - ".github/workflows/rag-ci.yml"
      - ".github/workflows/rag-artifact-release.yml"
  pull_request:
    paths:
      - "backend/rag/**"
      - ".github/workflows/rag-ci.yml"
      - ".github/workflows/rag-artifact-release.yml"

jobs:
  rag:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/rag
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/rag/pyproject.toml
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check app core domain generation llm pipelines providers repositories retrieval services tests scripts jobs
      - name: Mypy (core packages)
        run: >-
          python -m mypy --explicit-package-bases
          -p core -p domain -p generation -p providers -p pipelines
          -p repositories -p retrieval.scoring
      - name: Import app
        run: python -c "from app.main import app; print(app.title)"
      - name: Build CI fixture artifacts
        run: python jobs/build_rag_artifacts.py --from-fixture
      - name: Unit, API & retrieval tests (coverage gate 70%)
        run: python -m pytest tests/ -q
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rag-coverage
          path: backend/rag/.coverage
          if-no-files-found: ignore
      - name: Docker build
        run: docker build -t unutrip-rag:ci .
      - name: Verify artifacts (strict)
        run: python scripts/verify_rag_artifacts.py --strict
      - name: Offline eval (fixture golden set)
        run: >-
          python scripts/eval_rag_retrieval.py --ci
          --golden eval/golden_queries_ci.json
          --require-labels
          --min-province-accuracy 1.0
          --min-hit-at5 0.75
