name: RAG service

on:
  workflow_dispatch:
  push:
    paths:
      - "backend/rag/**"
      - ".github/workflows/rag-ci.yml"
  pull_request:
    paths:
      - "backend/rag/**"
      - ".github/workflows/rag-ci.yml"

jobs:
  rag:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/rag
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/rag/requirements.txt
            backend/rag/requirements-dev.txt
      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt && pip install --no-deps -e .
      - name: Ruff lint
        run: ruff check app core domain generation llm pipelines retrieval services tests scripts
      - name: Import app
        run: python -c "from app.main import app; print(app.title)"
      - name: Build CI fixture artifacts
        run: python jobs/build_rag_artifacts.py --from-fixture
      - name: Unit, API & retrieval tests
        run: python -m pytest tests/ -q
      - name: Verify artifacts (strict)
        run: python scripts/verify_rag_artifacts.py --strict
      - name: Offline eval (fixture golden set)
        run: >-
          python scripts/eval_rag_retrieval.py --ci
          --golden eval/golden_queries_ci.json
          --require-labels
          --min-province-accuracy 1.0
          --min-hit-at5 0.75
