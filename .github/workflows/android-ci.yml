name: Android CI

on:
  push:
    paths:
      - "app/**"
      - "build.gradle"
      - "settings.gradle"
      - "gradle/**"
      - "gradle.properties"
      - "gradlew"
      - "gradlew.bat"
      - ".github/workflows/android-ci.yml"
  pull_request:
    paths:
      - "app/**"
      - "build.gradle"
      - "settings.gradle"
      - "gradle/**"
      - "gradle.properties"
      - "gradlew"
      - "gradlew.bat"
      - ".github/workflows/android-ci.yml"
  workflow_dispatch:

concurrency:
  group: android-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  android:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - name: Gradle wrapper executable (Unix)
        run: chmod +x gradlew

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Unit tests, Lint, assemble (devDebug)
        run: ./gradlew testDevDebugUnitTest lintDevDebug assembleDevDebug --no-daemon --stacktrace
