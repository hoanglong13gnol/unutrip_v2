name: Backend CI

on:
  workflow_dispatch:
  push:
    paths:
      - "backend/nodejs/**"
      - "database/**"
      - "docker-compose.yml"
      - "deploy/**"
      - ".env.example"
      - ".github/workflows/backend-ci.yml"
      - ".github/workflows/rag-artifact-release.yml"
  pull_request:
    paths:
      - "backend/nodejs/**"
      - "database/**"
      - "docker-compose.yml"
      - "deploy/**"
      - ".env.example"
      - ".github/workflows/backend-ci.yml"
      - ".github/workflows/rag-artifact-release.yml"

jobs:
  node-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/nodejs
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/nodejs/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Prettier (scoped)
        run: npm run format:check
      - name: Unit tests
        run: npm test
      - name: Syntax check
        run: node --check src/index.js
      - name: Docker build
        run: docker build -t unutrip-backend:ci .

  database-scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate migration shell script
        run: bash -n database/scripts/run_migrations.sh
      - name: List migrations (order check)
        run: ls -1 database/migrations/[0-9][0-9][0-9]_*.sql | wc -l
