name: Backend & RAG CI

on:
  workflow_dispatch:
  push:
    paths:
      - "backend/rag/**"
      - "backend/nodejs/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/rag/**"
      - "backend/nodejs/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  node-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/nodejs
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/nodejs/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Prettier (scoped)
        run: npm run format:check
      - name: Unit tests
        run: npm test
      - name: Syntax check
        run: node --check src/index.js
