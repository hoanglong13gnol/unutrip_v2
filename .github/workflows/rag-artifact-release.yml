name: RAG artifact package (manual)

# Build a distributable BM25 bundle zip for staging/prod (no MySQL in CI).
# For production corpus from DB, run locally: jobs/build_rag_artifacts.py --from-db
# then upload the generated dist/*.zip to your object store / GitHub Release.

on:
  workflow_dispatch:
    inputs:
      upload_artifact:
        description: Upload zip as GitHub Actions artifact
        type: boolean
        default: true

jobs:
  package-fixture-bundle:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/rag
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/rag/pyproject.toml
      - name: Install
        run: pip install -e .
      - name: Build CI fixture index
        run: python jobs/build_rag_artifacts.py --from-fixture
      - name: Verify manifest (strict, portable paths)
        run: python scripts/verify_rag_artifacts.py --strict
      - name: Package zip
        run: python jobs/package_rag_artifacts.py -o dist/unutrip-rag-artifacts.zip
      - name: Upload bundle artifact
        if: inputs.upload_artifact
        uses: actions/upload-artifact@v4
        with:
          name: unutrip-rag-artifacts-fixture
          path: backend/rag/dist/unutrip-rag-artifacts.zip
          retention-days: 14
