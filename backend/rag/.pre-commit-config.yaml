# Install: pip install pre-commit && pre-commit install
# Run all: pre-commit run --all-files
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix]

  - repo: local
    hooks:
      - id: mypy-rag
        name: mypy (RAG core packages)
        entry: python -m mypy --explicit-package-bases -p core -p domain -p generation -p providers -p pipelines -p repositories -p retrieval -p app
        language: system
        pass_filenames: false

      - id: pytest-rag-quick
        name: pytest RAG (no coverage, fast)
        entry: python -m pytest tests/ -q --no-cov
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: manifest-staged-diff
        name: manifest — no timestamp-only commits
        entry: python scripts/check_manifest_staged_diff.py
        language: system
        pass_filenames: false
        files: ^data/indexes/rag_artifacts_manifest\.json$
