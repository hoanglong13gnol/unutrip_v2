# UNUtrip stack: MySQL + Redis + FastAPI RAG + Node backend
#
# Prerequisites:
#   cp .env.example .env   (set GEMINI_API_KEY, JWT_SECRET, DB passwords at minimum)
#
# Run:
#   docker compose up -d --build
#
# Backend:     http://localhost:3000/api/health
# RAG docs:    http://localhost:8001/docs
# MySQL:       localhost:3306 (see MYSQL_* variables)
#
# DB: service `db-migrate` applies database/migrations/ once (see database/README.md).
# Set DATABASE_BOOTSTRAP_LEGACY=false if DB already has `users` (e.g. after database/dumps/*.sql import).

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-unutrip_root_secret}
      MYSQL_DATABASE: ${DB_NAME:-unudata}
      MYSQL_USER: ${MYSQL_USER:-unutrip}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-unutrip_pass}
    ports:
      - "${MYSQL_PUBLISH_PORT:-3306}:3306"
    volumes:
      - unutrip_mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\" || exit 1"
        ]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 30s

  db-migrate:
    image: mysql:8.0
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: ${MYSQL_USER:-unutrip}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-unutrip_pass}
      DB_NAME: ${DB_NAME:-unudata}
      DATABASE_BOOTSTRAP_LEGACY: ${DATABASE_BOOTSTRAP_LEGACY:-true}
      SKIP_MIGRATION_VALIDATION: ${SKIP_MIGRATION_VALIDATION:-false}
      MIGRATIONS_DIR: /migrations
      LEGACY_SQL: /legacy/database.sql
      QUICK_POPULATE_SQL: /quick_populate.sql
    volumes:
      - ./database/migrations:/migrations:ro
      - ./database/scripts/run_migrations.sh:/run_migrations.sh:ro
      - ./backend/nodejs/database.sql:/legacy/database.sql:ro
      - ./database/quick_populate_app_places_from_legacy_database_sql.sql:/quick_populate.sql:ro
    command: ["bash", "-c", "sed -i 's/\\r$//' /run_migrations.sh && bash /run_migrations.sh"]
    restart: "no"

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - unutrip_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  rag:
    build:
      context: ./backend/rag
      dockerfile: Dockerfile
    ports:
      - "${RAG_PUBLISH_PORT:-8001}:8001"
    env_file:
      - .env
    environment:
      # Override host-specific defaults from .env when running inside Compose
      PYTHONPATH: /svc
      REDIS_URL: redis://redis:6379/0
      RAG_CORS_ORIGINS: ${RAG_CORS_ORIGINS:-http://localhost:3000}
      RAG_INTERNAL_API_KEY: ${RAG_INTERNAL_API_KEY:-}
      RAG_ADMIN_API_KEY: ${RAG_ADMIN_API_KEY:-}
      # Optional: fetch release zip on container start (see backend/rag/docs/DEPLOY_CHECKLIST.md)
      RAG_ARTIFACT_BUNDLE_URL: ${RAG_ARTIFACT_BUNDLE_URL:-}
      RAG_ARTIFACT_SOURCE_DIR: ${RAG_ARTIFACT_SOURCE_DIR:-}
    # Optional host mount when using local artifact dir (do not leave `volumes:` empty — Compose requires an array):
    # volumes:
    #   - ${RAG_ARTIFACT_HOST_DIR:-./backend/rag/data}:/svc/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; r=urllib.request.urlopen('http://127.0.0.1:8001/health/ready'); exit(0 if r.status==200 else 1)\""
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 120s

  backend:
    build:
      context: ./backend/nodejs
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PUBLISH_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      # development: cho phép JWT_SECRET mặc định trong code. Production: đặt NODE_ENV=production + JWT_SECRET mạnh.
      NODE_ENV: ${NODE_ENV:-development}
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: 3000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${MYSQL_USER:-unutrip}
      DB_PASSWORD: ${MYSQL_PASSWORD:-unutrip_pass}
      DB_NAME: ${DB_NAME:-unudata}
      RAG_BASE_URL: http://rag:8001
      RAG_INTERNAL_API_KEY: ${RAG_INTERNAL_API_KEY:-}
      RAG_ADMIN_API_KEY: ${RAG_ADMIN_API_KEY:-}
      JWT_SECRET: ${JWT_SECRET:-}
      # v2 place resolution (Compose stack runs migrations + legacy bootstrap by default)
      USE_V2_PLACE_TABLES: ${USE_V2_PLACE_TABLES:-true}
      PLACE_ID_LEGACY_FALLBACK: ${PLACE_ID_LEGACY_FALLBACK:-false}
    volumes:
      - unutrip_backend_uploads:/app/uploads
      - unutrip_backend_public_images:/app/public/images
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy
      rag:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

volumes:
  unutrip_mysql_data:
  unutrip_redis_data:
  unutrip_backend_uploads:
  unutrip_backend_public_images:
